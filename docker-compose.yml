version: "3.9"

services:
  frontend:
    container_name: qrform-app
    image: qrform-app:latest
    restart: unless-stopped
    # Internal port yang bisa diakses oleh service nginx
    expose:
      - "5174:5174"
    networks:
      - qrform-network

  nginx:
    container_name: qrform-nginx
    image: nginx:stable-alpine
    ports:
      - "5175:80" # Akses dari luar lewat port 5175
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - qrform-network

networks:
  qrform-network:
    driver: bridge