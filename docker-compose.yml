services:
  frontend:
    build: .
    volumes:
      - ./dist:/app/dist
    command: sh -c "npm run build"
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: react-nginx
    ports:
      - "5175:80"
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge