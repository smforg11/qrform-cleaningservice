version: "3.9"

services:
  frontend:
    container_name: qrform-app
    build:
      context: .
    image: qrform-app:latest
    restart: unless-stopped
    ports:
      - "5174:5174"
    networks:
      - qrform-network

  nginx:
    container_name: qrform-nginx
    image: nginx:stable-alpine
    ports:
      - "5175:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - qrform-network

networks:
  qrform-network:
    driver: bridge