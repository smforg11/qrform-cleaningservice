version: "3.9"

services:
  frontend:
    container_name: react-vite-dev
    image: frontend:latest
    ports:
      - "5173:5173"
    restart: unless-stopped
    
  nginx_proxy:
    container_name: nginx_proxy
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - /home/itdev/qrform/current:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped