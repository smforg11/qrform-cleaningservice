name: CI/CD Release QRForm

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout Code ke runner
        uses: actions/checkout@v4

      - name: Set Image Tag (date)
        run: echo "IMAGE_TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Build Docker Image 
        run: |
          docker build \
            -t qrform:latest \
            -t qrform:${IMAGE_TAG} .

      - name: Run container baru
        run: |
          IMAGE_TAG=${IMAGE_TAG} docker compose up -d
