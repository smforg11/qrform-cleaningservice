name: CI/CD Release QRForm

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/itdev/qrform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Project
        run: |
          rsync -avz --delete --exclude '.git' ${{ github.workspace }}/ .

      - name: Set ENV Version (tanpa overwrite)
        run: |
          sed -i '/APP_VERSION/d' .env || true
          echo "APP_VERSION=${{ github.sha }}" >> .env

      - name: Build & Deploy
        run: |
          docker compose down
          docker compose up -d --build

      - name: Cleanup Docker
        run: |
          docker image prune -f