name: CI/CD Release QRForm

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/itdev/qrform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        # File default ditarik ke folder internal runner dulu

      - name: Sinkronisasi Kodingan ke Project
        run: |
          rsync -avz --delete --exclude '.git' ${{ github.workspace }}/ .

      - name: Build New Image
        run: |
          docker build -t qrform-app:${{ github.sha }} .
          docker tag qrform-app:${{ github.sha }} qrform-app:latest

      - name: Deploy with Compose
        run: |
          echo "APP_VERSION=${{ github.sha }}" > .env
          docker compose up -d
          
      - name: Housekeeping
        run: |
          docker image prune -f