name: Auto Deploy Zero Downtime

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        run: |
          PROJECT_DIR=/home/itdev/qrform
          RELEASES_DIR=$PROJECT_DIR/releases
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          NEW_RELEASE=$RELEASES_DIR/$TIMESTAMP

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "RELEASES_DIR=$RELEASES_DIR" >> $GITHUB_ENV
          echo "NEW_RELEASE=$NEW_RELEASE" >> $GITHUB_ENV

      - name: Create release folder
        run: |
          mkdir -p $NEW_RELEASE
          rsync -a --exclude='.git' ./ $NEW_RELEASE/

      - name: Build Docker Image
        run: |
          cd $NEW_RELEASE
          docker compose build

      - name: Switch Symlink
        run: |
          ln -sfn $NEW_RELEASE $PROJECT_DIR/current

      - name: Restart Container
        run: |
          cd $PROJECT_DIR/current
          docker compose up -d

      - name: Cleanup old releases
        run: |
          cd $RELEASES_DIR
          ls -1dt */ | tail -n +6 | xargs rm -rf || true
          
        
      
